openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: profiles
    description: Profile operations
  - name: posts
    description: Post operations
  - name: media
    description: Media upload operations
  - name: comments
    description: Comment operations
  - name: engagement
    description: Engagement operations (likes, saves)
  - name: friends
    description: Friend request and friendship operations
  - name: feed
    description: Feed operations
  - name: discover
    description: Discovery operations
  - name: notifications
    description: Notification operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      description: Given a valid email and password, when a user registers, then an account is created and a session is established via HTTP-only cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          headers:
            Set-Cookie:
              description: Session cookie (HttpOnly, Secure, SameSite=Strict)
              schema:
                type: string
                example: session_id=abc123; Path=/; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      description: Given valid credentials, when a user logs in, then a session is established via HTTP-only cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: Session cookie (HttpOnly, Secure, SameSite=Strict)
              schema:
                type: string
                example: session_id=abc123; Path=/; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials (generic error, does not reveal account existence)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current session
      description: Given an authenticated user, when they log out, then the session is terminated and the cookie is cleared.
      security:
        - cookieAuth: []
      responses:
        "204":
          description: Logout successful
          headers:
            Set-Cookie:
              description: Session cookie cleared
              schema:
                type: string
                example: session_id=; Path=/; HttpOnly; Secure; SameSite=Strict; Max-Age=0
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      description: Given an authenticated user, when they request their profile, then their user and profile information is returned.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/refresh:
    post:
      operationId: refreshSession
      tags: [auth]
      summary: Refresh session
      description: Given a valid session cookie, when refreshed, then the session expiration is extended.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Session refreshed
          headers:
            Set-Cookie:
              description: Refreshed session cookie (HttpOnly, Secure, SameSite=Strict)
              schema:
                type: string
                example: session_id=xyz789; Path=/; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Invalid or expired session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /profiles/{handle}:
    get:
      operationId: getProfileByHandle
      tags: [profiles]
      summary: Get profile by handle
      description: Given a profile handle, when a viewer requests it, then the profile is returned with modules filtered by the viewer's relationship (everyone, friends, or onlyMe visibility).
      security:
        - cookieAuth: []
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      summary: Get current user's profile
      description: Given an authenticated user, when they request their profile, then their full profile with all modules is returned regardless of visibility settings.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user's profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMyProfile
      tags: [profiles]
      summary: Update current user's profile
      description: Given an authenticated user, when they update their profile, then allowed fields and module settings are persisted atomically. Immutable fields (userId, joinedAt) are rejected.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /profiles/me/top-friends:
    get:
      operationId: getMyTopFriends
      tags: [profiles]
      summary: Get current user's top friends
      description: Given an authenticated user, when they request their top friends, then the list of top friend user IDs is returned.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Top friends retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopFriendsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMyTopFriends
      tags: [profiles]
      summary: Update current user's top friends
      description: Given an authenticated user, when they update their top friends, then the list of top friend user IDs is persisted.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopFriendsUpdateRequest"
      responses:
        "200":
          description: Top friends updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopFriendsResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /posts:
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new post
      description: Given an authenticated user, when they create a post, then the post is persisted with inferred topics and returned. Text posts infer topics from keywords; video and reel posts require media URLs.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostCreateRequest"
      responses:
        "201":
          description: Post created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listPosts
      tags: [posts]
      summary: List posts
      description: Given a request, when posts are listed, then posts are returned. Supports filtering by authorId for user-specific feeds.
      security:
        - cookieAuth: []
      parameters:
        - name: authorId
          in: query
          required: false
          schema:
            type: string
          description: Filter posts by author ID
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Maximum number of posts to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of posts to skip for pagination
      responses:
        "200":
          description: Posts retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostListResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /posts/{postId}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a single post
      description: Given a post ID, when requested, then the post is returned with full details including author information.
      security:
        - cookieAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      description: Given an authenticated user and their post, when deleted, then the post is removed or soft-deleted according to business rules.
      security:
        - cookieAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Post deleted successfully
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not authorized to delete this post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /posts/{postId}/repost:
    post:
      operationId: repostPost
      tags: [posts]
      summary: Repost a post
      description: Given an authenticated user and an existing post, when they repost, then a new post is created with repostOf pointing to the ultimate original post. Duplicate reposts by the same user for the same original are rejected.
      security:
        - cookieAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Repost created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "400":
          description: Invalid request (validation error or duplicate repost)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Original post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /media/upload:
    post:
      operationId: uploadMedia
      tags: [media]
      summary: Upload media file
      description: Given an authenticated user, when they upload a media file, then the file is stored to object storage and a stable URL is returned for use in posts or avatars. Accepted MIME types: image/jpeg, image/png, image/gif, image/webp, video/mp4, video/webm. Maximum file size: 10MB.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The media file to upload (image or video)
              required:
                - file
      responses:
        "201":
          description: Media uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaUploadResponse"
        "400":
          description: Invalid request (invalid file type, file too large, or validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Payload too large (file exceeds maximum size)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /posts/{postId}/comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments for a post
      description: Given a post ID, when comments are requested, then comments are returned in chronological order with pagination. Author information is included for each comment.
      security:
        - cookieAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the post to list comments for
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Maximum number of comments to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of comments to skip for pagination
      responses:
        "200":
          description: Comments retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentListResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createComment
      tags: [comments]
      summary: Create a comment on a post
      description: Given an authenticated user and a post, when they create a comment, then the comment is persisted and returned with author information.
      security:
        - cookieAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the post to comment on
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateRequest"
      responses:
        "201":
          description: Comment created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /posts/{postId}/like:
    post:
      operationId: likePost
      tags: [engagement]
      summary: Like a post
      description: Given an authenticated user and a post, when they like the post, then the like is recorded and the post's like count increments. Duplicate like requests are idempotent and return success without incrementing the count again.
      security:
        - cookieAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the post to like
      responses:
        "200":
          description: Post liked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementSummary"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: unlikePost
      tags: [engagement]
      summary: Unlike a post
      description: Given an authenticated user and a post they have liked, when they unlike the post, then the like is removed and the post's like count decrements. Unlike requests when the user has not liked the post are idempotent and return success without decrementing the count.
      security:
        - cookieAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the post to unlike
      responses:
        "200":
          description: Post unliked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementSummary"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /posts/{postId}/save:
    post:
      operationId: savePost
      tags: [engagement]
      summary: Save a post
      description: Given an authenticated user and a post, when they save the post, then the save is recorded and the post's save count increments. Duplicate save requests are idempotent and return success without incrementing the count again.
      security:
        - cookieAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the post to save
      responses:
        "200":
          description: Post saved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementSummary"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: unsavePost
      tags: [engagement]
      summary: Unsave a post
      description: Given an authenticated user and a post they have saved, when they unsave the post, then the save is removed and the post's save count decrements. Unsave requests when the user has not saved the post are idempotent and return success without decrementing the count.
      security:
        - cookieAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the post to unsave
      responses:
        "200":
          description: Post unsaved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementSummary"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /friends/requests:
    post:
      operationId: sendFriendRequest
      tags: [friends]
      summary: Send a friend request
      description: Given an authenticated user and a target user ID, when they send a friend request, then a pending request is created if one does not already exist. Duplicate requests are rejected.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendFriendRequestRequest"
      responses:
        "201":
          description: Friend request sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequestResponse"
        "400":
          description: Invalid request (validation error or duplicate request)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Target user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Friend request already exists or users are already friends
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listFriendRequests
      tags: [friends]
      summary: List friend requests
      description: Given an authenticated user, when they request their friend requests, then incoming and outgoing requests are returned with pagination.
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [incoming, outgoing]
            default: incoming
          description: Filter by request type (incoming or outgoing)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Maximum number of requests to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of requests to skip for pagination
      responses:
        "200":
          description: Friend requests retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequestListResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /friends/requests/{requestId}:
    post:
      operationId: acceptFriendRequest
      tags: [friends]
      summary: Accept a friend request
      description: Given an authenticated user and an incoming friend request, when they accept it, then a symmetric friendship is created and the request is marked as accepted. Only the recipient can accept.
      security:
        - cookieAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the friend request to accept
      responses:
        "200":
          description: Friend request accepted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendshipResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not authorized to accept this request (not the recipient)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Friend request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Request not in pending state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: cancelFriendRequest
      tags: [friends]
      summary: Cancel a friend request
      description: Given an authenticated user and an outgoing friend request, when they cancel it, then the request is removed. Only the sender can cancel pending requests.
      security:
        - cookieAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the friend request to cancel
      responses:
        "204":
          description: Friend request cancelled successfully
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not authorized to cancel this request (not the sender)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Friend request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /friends/requests/{requestId}/decline:
    post:
      operationId: declineFriendRequest
      tags: [friends]
      summary: Decline a friend request
      description: Given an authenticated user and an incoming friend request, when they decline it, then the request is marked as declined. Only the recipient can decline.
      security:
        - cookieAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the friend request to decline
      responses:
        "204":
          description: Friend request declined successfully
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not authorized to decline this request (not the recipient)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Friend request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Request not in pending state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /friends:
    get:
      operationId: listFriends
      tags: [friends]
      summary: List friends
      description: Given an authenticated user, when they request their friends list, then all friends are returned with pagination and profile information.
      security:
        - cookieAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Maximum number of friends to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of friends to skip for pagination
      responses:
        "200":
          description: Friends retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendListResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: removeFriend
      tags: [friends]
      summary: Remove a friend
      description: Given an authenticated user and a friend user ID, when they remove the friend, then the symmetric friendship is deleted for both users.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoveFriendRequest"
      responses:
        "204":
          description: Friend removed successfully
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Friendship not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /feed:
    get:
      operationId: getFeed
      tags: [feed]
      summary: Get main feed
      description: Given an authenticated user, when they request their main feed, then posts from friends and themselves are returned in chronological order with pagination.
      security:
        - cookieAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of posts to return
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: Number of posts to skip for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Feed retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /feed/recommended:
    get:
      operationId: getRecommendedFeed
      tags: [feed]
      summary: Get recommended feed
      description: Given an authenticated user, when they request their recommended feed, then posts from non-friends are returned ranked by engagement with pagination.
      security:
        - cookieAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of posts to return
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: Number of posts to skip for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Recommended feed retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /discover:
    get:
      operationId: discoverPosts
      tags: [discover]
      summary: Discover posts by search
      description: Given an authenticated user, when they search discover, then results are filtered by topic and text with ranking by likes.
      security:
        - cookieAuth: []
      parameters:
        - name: q
          in: query
          description: Search query for text matching
          schema:
            type: string
        - name: topic
          in: query
          description: Filter by topic
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of posts to return
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: Number of posts to skip for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Discovery results retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /discover/trending:
    get:
      operationId: getTrendingPosts
      tags: [discover]
      summary: Get trending posts
      description: Given an authenticated user, when they request trending posts, then posts are returned sorted by recent engagement (likes, reposts, saves) with pagination.
      security:
        - cookieAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of posts to return
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: Number of posts to skip for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Trending posts retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      description: Given an authenticated user, when they request their notifications, then unread and read notifications are returned in reverse chronological order with pagination.
      security:
        - cookieAuth: []
      parameters:
        - name: unreadOnly
          in: query
          description: Filter to only unread notifications
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          description: Maximum number of notifications to return
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: Number of notifications to skip for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Notifications retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      description: Given an authenticated user, when they mark all notifications as read, then all their unread notifications are marked as read.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: All notifications marked as read successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkReadResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /notifications/{notificationId}:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      description: Given an authenticated user and a notification ID, when they mark it as read, then the notification's read status is updated. Only the recipient can mark their own notifications as read.
      security:
        - cookieAuth: []
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the notification to mark as read
      responses:
        "200":
          description: Notification marked as read successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not authorized to mark this notification as read (not the recipient)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /notifications/stream:
    get:
      operationId: streamNotifications
      tags: [notifications]
      summary: Stream real-time notifications via SSE
      description: Given an authenticated user, when they connect to the notification stream via Server-Sent Events (SSE), then they receive real-time notifications as they are created. The browser's EventSource API handles automatic reconnection. Heartbeat comments are sent every 30 seconds to keep the connection alive.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Notification stream established (SSE)
          content:
            text/event-stream:
              schema:
                type: string
              example: "data: {\"notification\":{\"id\":\"...\",\"type\":\"like\",...},\"actor\":{...},\"post\":{...}}\n\n"
          headers:
            Content-Type:
              description: text/event-stream
              schema:
                type: string
            Cache-Control:
              description: No caching for SSE
              schema:
                type: string
                example: no-cache
            Connection:
              description: Keep-alive for SSE
              schema:
                type: string
                example: keep-alive
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_id
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 8
      required:
        - email
        - password
    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password
    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        emailVerified:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - email
        - createdAt
        - updatedAt
    ProfileResponse:
      type: object
      properties:
        userId:
          type: string
        handle:
          type: string
        name:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        wallpaper:
          type: string
          nullable: true
        accentColor:
          type: string
          nullable: true
        moodLabel:
          type: string
          nullable: true
        moodIcon:
          type: string
          nullable: true
        nowPlaying:
          type: string
          nullable: true
        moduleSettings:
          type: array
          items:
            $ref: "#/components/schemas/ProfileModule"
        joinedAt:
          type: string
      required:
        - userId
        - handle
        - name
        - moduleSettings
        - joinedAt
    ProfileModule:
      type: object
      properties:
        id:
          type: string
          enum: [about, topFriends, mood, posts]
        visible:
          type: boolean
        visibility:
          type: string
          enum: [everyone, friends, onlyMe]
        order:
          type: number
      required:
        - id
        - visible
        - visibility
        - order
    UserProfileResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        profile:
          $ref: "#/components/schemas/ProfileResponse"
      required:
        - user
        - profile
    Error:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    ProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        wallpaper:
          type: string
          nullable: true
        accentColor:
          type: string
          nullable: true
        moodLabel:
          type: string
          nullable: true
        moodIcon:
          type: string
          nullable: true
        nowPlaying:
          type: string
          nullable: true
        moduleSettings:
          type: array
          items:
            $ref: "#/components/schemas/ProfileModule"
    TopFriendsResponse:
      type: object
      properties:
        topFriends:
          type: array
          items:
            type: string
          description: Array of user IDs representing the user's top friends
      required:
        - topFriends
    TopFriendsUpdateRequest:
      type: object
      properties:
        topFriends:
          type: array
          items:
            type: string
          description: Array of user IDs to set as top friends
      required:
        - topFriends
    PostKind:
      type: string
      enum: [text, video, reel]
    RepostInfo:
      type: object
      properties:
        originalPostId:
          type: string
        originalAuthorId:
          type: string
      required:
        - originalPostId
        - originalAuthorId
    TextPostContent:
      type: object
      properties:
        kind:
          type: string
          enum: [text]
        text:
          type: string
      required:
        - kind
        - text
    VideoPostContent:
      type: object
      properties:
        kind:
          type: string
          enum: [video]
        title:
          type: string
        thumbnailUrl:
          type: string
        durationLabel:
          type: string
        viewsLabel:
          type: string
      required:
        - kind
        - title
        - thumbnailUrl
        - durationLabel
        - viewsLabel
    ReelPostContent:
      type: object
      properties:
        kind:
          type: string
          enum: [reel]
        caption:
          type: string
        thumbnailUrl:
          type: string
        soundLabel:
          type: string
        viewsLabel:
          type: string
      required:
        - kind
        - caption
        - thumbnailUrl
        - soundLabel
        - viewsLabel
    PostCreateRequest:
      oneOf:
        - $ref: "#/components/schemas/TextPostContent"
        - $ref: "#/components/schemas/VideoPostContent"
        - $ref: "#/components/schemas/ReelPostContent"
    PostResponse:
      type: object
      properties:
        id:
          type: string
        authorId:
          type: string
        kind:
          $ref: "#/components/schemas/PostKind"
        text:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        caption:
          type: string
          nullable: true
        thumbnailUrl:
          type: string
          nullable: true
        durationLabel:
          type: string
          nullable: true
        viewsLabel:
          type: string
          nullable: true
        soundLabel:
          type: string
          nullable: true
        repostOf:
          $ref: "#/components/schemas/RepostInfo"
          nullable: true
        topics:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        deletedAt:
          type: string
          nullable: true
      required:
        - id
        - authorId
        - kind
        - topics
        - createdAt
        - updatedAt
    PostListResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/PostResponse"
        total:
          type: integer
          description: Total count of posts matching the query
      required:
        - posts
        - total
    MediaUploadResponse:
      type: object
      properties:
        url:
          type: string
          description: The stable URL of the uploaded media file
        mediaId:
          type: string
          description: The unique identifier for the uploaded media
        mimeType:
          type: string
          description: The MIME type of the uploaded file
        sizeBytes:
          type: integer
          description: The size of the uploaded file in bytes
      required:
        - url
        - mediaId
        - mimeType
        - sizeBytes
    CommentCreateRequest:
      type: object
      properties:
        text:
          type: string
          description: The comment text content
      required:
        - text
    AuthorProfile:
      type: object
      properties:
        userId:
          type: string
          description: The unique identifier for the user
        handle:
          type: string
          description: The user's unique handle
        name:
          type: string
          description: The user's display name
        avatarUrl:
          type: string
          nullable: true
          description: The URL of the user's avatar image
      required:
        - userId
        - handle
        - name
    CommentResponse:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the comment
        postId:
          type: string
          description: The ID of the post this comment belongs to
        author:
          $ref: "#/components/schemas/AuthorProfile"
          description: The author of the comment with their profile information
        text:
          type: string
          description: The comment text content
        createdAt:
          type: string
          description: ISO timestamp when the comment was created
      required:
        - id
        - postId
        - author
        - text
        - createdAt
    CommentListResponse:
      type: object
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/CommentResponse"
          description: Array of comments for the post
        total:
          type: integer
          description: Total count of comments for the post
      required:
        - comments
        - total
    EngagementSummary:
      type: object
      properties:
        postId:
          type: string
          description: The ID of the post
        likeCount:
          type: integer
          description: Total number of likes for the post
        saveCount:
          type: integer
          description: Total number of saves for the post
        repostCount:
          type: integer
          description: Total number of reposts for the post (derived from posts table)
        viewerHasLiked:
          type: boolean
          description: Whether the current viewer has liked this post
        viewerHasSaved:
          type: boolean
          description: Whether the current viewer has saved this post
        viewerHasReposted:
          type: boolean
          description: Whether the current viewer has reposted this post
      required:
        - postId
        - likeCount
        - saveCount
        - repostCount
        - viewerHasLiked
        - viewerHasSaved
        - viewerHasReposted
    FriendRequestStatus:
      type: string
      enum: [pending, accepted, declined, cancelled]
    SendFriendRequestRequest:
      type: object
      properties:
        targetUserId:
          type: string
          description: The ID of the user to send a friend request to
      required:
        - targetUserId
    FriendRequestResponse:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the friend request
        senderId:
          type: string
          description: The ID of the user who sent the request
        receiverId:
          type: string
          description: The ID of the user who received the request
        status:
          $ref: "#/components/schemas/FriendRequestStatus"
          description: The current status of the friend request
        createdAt:
          type: string
          description: ISO timestamp when the request was created
        updatedAt:
          type: string
          description: ISO timestamp when the request was last updated
      required:
        - id
        - senderId
        - receiverId
        - status
        - createdAt
        - updatedAt
    FriendRequestListResponse:
      type: object
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/FriendRequestResponse"
          description: Array of friend requests
        total:
          type: integer
          description: Total count of friend requests
      required:
        - requests
        - total
    FriendshipResponse:
      type: object
      properties:
        userId:
          type: string
          description: The ID of the user
        friendId:
          type: string
          description: The ID of the friend
        createdAt:
          type: string
          description: ISO timestamp when the friendship was created
      required:
        - userId
        - friendId
        - createdAt
    FriendProfile:
      type: object
      properties:
        userId:
          type: string
          description: The unique identifier for the user
        handle:
          type: string
          description: The user's unique handle
        name:
          type: string
          description: The user's display name
        avatarUrl:
          type: string
          nullable: true
          description: The URL of the user's avatar image
      required:
        - userId
        - handle
        - name
    FriendListResponse:
      type: object
      properties:
        friends:
          type: array
          items:
            $ref: "#/components/schemas/FriendProfile"
          description: Array of friends with their profile information
        total:
          type: integer
          description: Total count of friends
      required:
        - friends
        - total
    RemoveFriendRequest:
      type: object
      properties:
        friendUserId:
          type: string
          description: The ID of the friend to remove
      required:
        - friendUserId
    FeedPost:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the post
        authorId:
          type: string
          description: The unique identifier for the author
        author:
          $ref: "#/components/schemas/AuthorProfile"
        kind:
          type: string
          enum: [text, video, reel]
          description: The kind of post
        text:
          type: string
          nullable: true
          description: The text content (for text posts)
        title:
          type: string
          nullable: true
          description: The title (for video posts)
        caption:
          type: string
          nullable: true
          description: The caption (for reel posts)
        thumbnailUrl:
          type: string
          nullable: true
          description: The URL of the thumbnail image
        durationLabel:
          type: string
          nullable: true
          description: The duration label (e.g., "3:45")
        viewsLabel:
          type: string
          nullable: true
          description: The views label (e.g., "1.2K")
        soundLabel:
          type: string
          nullable: true
          description: The sound label (for reels)
        topics:
          type: array
          items:
            type: string
          description: Array of topic tags
        createdAt:
          type: string
          description: ISO timestamp when the post was created
        engagement:
          $ref: "#/components/schemas/EngagementSummary"
      required:
        - id
        - authorId
        - author
        - kind
        - createdAt
        - engagement
    FeedResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/FeedPost"
          description: Array of posts with author information
        total:
          type: integer
          description: Total count of posts available
        limit:
          type: integer
          description: Maximum number of posts returned
        offset:
          type: integer
          description: Number of posts skipped
      required:
        - posts
        - total
        - limit
        - offset
    NotificationType:
      type: string
      enum: [like, comment, friendRequest, friendAccepted, repost, save]
      description: The type of notification event
    Notification:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the notification
        recipientId:
          type: string
          description: The ID of the user who received the notification
        actorId:
          type: string
          description: The ID of the user who triggered the notification
        type:
          $ref: "#/components/schemas/NotificationType"
          description: The type of notification event
        postId:
          type: string
          nullable: true
          description: The ID of the post related to the notification (for like, comment, repost, save)
        readAt:
          type: string
          nullable: true
          description: ISO timestamp when the notification was marked as read
        createdAt:
          type: string
          description: ISO timestamp when the notification was created
      required:
        - id
        - recipientId
        - actorId
        - type
        - createdAt
    NotificationResponse:
      type: object
      properties:
        notification:
          $ref: "#/components/schemas/Notification"
          description: The notification details
        actor:
          $ref: "#/components/schemas/AuthorProfile"
          description: The profile of the user who triggered the notification
        post:
          $ref: "#/components/schemas/FeedPost"
          nullable: true
          description: The post related to the notification (if applicable)
      required:
        - notification
        - actor
    NotificationListResponse:
      type: object
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/NotificationResponse"
          description: Array of notifications with actor and post information
        total:
          type: integer
          description: Total count of notifications
        unreadCount:
          type: integer
          description: Count of unread notifications
      required:
        - notifications
        - total
        - unreadCount
    MarkReadResponse:
      type: object
      properties:
        markedCount:
          type: integer
          description: Number of notifications marked as read
      required:
        - markedCount



openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: profiles
    description: Profile operations
  - name: posts
    description: Post operations
  - name: media
    description: Media upload operations
  - name: comments
    description: Comment operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      description: Given a valid email and password, when a user registers, then an account is created and a session is established via HTTP-only cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          headers:
            Set-Cookie:
              description: Session cookie (HttpOnly, Secure, SameSite=Strict)
              schema:
                type: string
                example: session_id=abc123; Path=/; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      description: Given valid credentials, when a user logs in, then a session is established via HTTP-only cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: Session cookie (HttpOnly, Secure, SameSite=Strict)
              schema:
                type: string
                example: session_id=abc123; Path=/; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials (generic error, does not reveal account existence)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current session
      description: Given an authenticated user, when they log out, then the session is terminated and the cookie is cleared.
      security:
        - cookieAuth: []
      responses:
        "204":
          description: Logout successful
          headers:
            Set-Cookie:
              description: Session cookie cleared
              schema:
                type: string
                example: session_id=; Path=/; HttpOnly; Secure; SameSite=Strict; Max-Age=0
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      description: Given an authenticated user, when they request their profile, then their user and profile information is returned.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/refresh:
    post:
      operationId: refreshSession
      tags: [auth]
      summary: Refresh session
      description: Given a valid session cookie, when refreshed, then the session expiration is extended.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Session refreshed
          headers:
            Set-Cookie:
              description: Refreshed session cookie (HttpOnly, Secure, SameSite=Strict)
              schema:
                type: string
                example: session_id=xyz789; Path=/; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Invalid or expired session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /profiles/{handle}:
    get:
      operationId: getProfileByHandle
      tags: [profiles]
      summary: Get profile by handle
      description: Given a profile handle, when a viewer requests it, then the profile is returned with modules filtered by the viewer's relationship (everyone, friends, or onlyMe visibility).
      security:
        - cookieAuth: []
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      summary: Get current user's profile
      description: Given an authenticated user, when they request their profile, then their full profile with all modules is returned regardless of visibility settings.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user's profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMyProfile
      tags: [profiles]
      summary: Update current user's profile
      description: Given an authenticated user, when they update their profile, then allowed fields and module settings are persisted atomically. Immutable fields (userId, joinedAt) are rejected.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /profiles/me/top-friends:
    get:
      operationId: getMyTopFriends
      tags: [profiles]
      summary: Get current user's top friends
      description: Given an authenticated user, when they request their top friends, then the list of top friend user IDs is returned.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Top friends retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopFriendsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMyTopFriends
      tags: [profiles]
      summary: Update current user's top friends
      description: Given an authenticated user, when they update their top friends, then the list of top friend user IDs is persisted.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopFriendsUpdateRequest"
      responses:
        "200":
          description: Top friends updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopFriendsResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /posts:
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new post
      description: Given an authenticated user, when they create a post, then the post is persisted with inferred topics and returned. Text posts infer topics from keywords; video and reel posts require media URLs.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostCreateRequest"
      responses:
        "201":
          description: Post created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listPosts
      tags: [posts]
      summary: List posts
      description: Given a request, when posts are listed, then posts are returned. Supports filtering by authorId for user-specific feeds.
      security:
        - cookieAuth: []
      parameters:
        - name: authorId
          in: query
          required: false
          schema:
            type: string
          description: Filter posts by author ID
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Maximum number of posts to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of posts to skip for pagination
      responses:
        "200":
          description: Posts retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostListResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /posts/{postId}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a single post
      description: Given a post ID, when requested, then the post is returned with full details including author information.
      security:
        - cookieAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      description: Given an authenticated user and their post, when deleted, then the post is removed or soft-deleted according to business rules.
      security:
        - cookieAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Post deleted successfully
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not authorized to delete this post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /posts/{postId}/repost:
    post:
      operationId: repostPost
      tags: [posts]
      summary: Repost a post
      description: Given an authenticated user and an existing post, when they repost, then a new post is created with repostOf pointing to the ultimate original post. Duplicate reposts by the same user for the same original are rejected.
      security:
        - cookieAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Repost created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "400":
          description: Invalid request (validation error or duplicate repost)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Original post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /media/upload:
    post:
      operationId: uploadMedia
      tags: [media]
      summary: Upload media file
      description: Given an authenticated user, when they upload a media file, then the file is stored to object storage and a stable URL is returned for use in posts or avatars. Accepted MIME types: image/jpeg, image/png, image/gif, image/webp, video/mp4, video/webm. Maximum file size: 10MB.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The media file to upload (image or video)
              required:
                - file
      responses:
        "201":
          description: Media uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaUploadResponse"
        "400":
          description: Invalid request (invalid file type, file too large, or validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Payload too large (file exceeds maximum size)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /posts/{postId}/comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments for a post
      description: Given a post ID, when comments are requested, then comments are returned in chronological order with pagination. Author information is included for each comment.
      security:
        - cookieAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the post to list comments for
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Maximum number of comments to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of comments to skip for pagination
      responses:
        "200":
          description: Comments retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentListResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createComment
      tags: [comments]
      summary: Create a comment on a post
      description: Given an authenticated user and a post, when they create a comment, then the comment is persisted and returned with author information.
      security:
        - cookieAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the post to comment on
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateRequest"
      responses:
        "201":
          description: Comment created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_id
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 8
      required:
        - email
        - password
    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password
    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        emailVerified:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - email
        - createdAt
        - updatedAt
    ProfileResponse:
      type: object
      properties:
        userId:
          type: string
        handle:
          type: string
        name:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        wallpaper:
          type: string
          nullable: true
        accentColor:
          type: string
          nullable: true
        moodLabel:
          type: string
          nullable: true
        moodIcon:
          type: string
          nullable: true
        nowPlaying:
          type: string
          nullable: true
        moduleSettings:
          type: array
          items:
            $ref: "#/components/schemas/ProfileModule"
        joinedAt:
          type: string
      required:
        - userId
        - handle
        - name
        - moduleSettings
        - joinedAt
    ProfileModule:
      type: object
      properties:
        id:
          type: string
          enum: [about, topFriends, mood, posts]
        visible:
          type: boolean
        visibility:
          type: string
          enum: [everyone, friends, onlyMe]
        order:
          type: number
      required:
        - id
        - visible
        - visibility
        - order
    UserProfileResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        profile:
          $ref: "#/components/schemas/ProfileResponse"
      required:
        - user
        - profile
    Error:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    ProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        wallpaper:
          type: string
          nullable: true
        accentColor:
          type: string
          nullable: true
        moodLabel:
          type: string
          nullable: true
        moodIcon:
          type: string
          nullable: true
        nowPlaying:
          type: string
          nullable: true
        moduleSettings:
          type: array
          items:
            $ref: "#/components/schemas/ProfileModule"
    TopFriendsResponse:
      type: object
      properties:
        topFriends:
          type: array
          items:
            type: string
          description: Array of user IDs representing the user's top friends
      required:
        - topFriends
    TopFriendsUpdateRequest:
      type: object
      properties:
        topFriends:
          type: array
          items:
            type: string
          description: Array of user IDs to set as top friends
      required:
        - topFriends
    PostKind:
      type: string
      enum: [text, video, reel]
    RepostInfo:
      type: object
      properties:
        originalPostId:
          type: string
        originalAuthorId:
          type: string
      required:
        - originalPostId
        - originalAuthorId
    TextPostContent:
      type: object
      properties:
        kind:
          type: string
          enum: [text]
        text:
          type: string
      required:
        - kind
        - text
    VideoPostContent:
      type: object
      properties:
        kind:
          type: string
          enum: [video]
        title:
          type: string
        thumbnailUrl:
          type: string
        durationLabel:
          type: string
        viewsLabel:
          type: string
      required:
        - kind
        - title
        - thumbnailUrl
        - durationLabel
        - viewsLabel
    ReelPostContent:
      type: object
      properties:
        kind:
          type: string
          enum: [reel]
        caption:
          type: string
        thumbnailUrl:
          type: string
        soundLabel:
          type: string
        viewsLabel:
          type: string
      required:
        - kind
        - caption
        - thumbnailUrl
        - soundLabel
        - viewsLabel
    PostCreateRequest:
      oneOf:
        - $ref: "#/components/schemas/TextPostContent"
        - $ref: "#/components/schemas/VideoPostContent"
        - $ref: "#/components/schemas/ReelPostContent"
    PostResponse:
      type: object
      properties:
        id:
          type: string
        authorId:
          type: string
        kind:
          $ref: "#/components/schemas/PostKind"
        text:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        caption:
          type: string
          nullable: true
        thumbnailUrl:
          type: string
          nullable: true
        durationLabel:
          type: string
          nullable: true
        viewsLabel:
          type: string
          nullable: true
        soundLabel:
          type: string
          nullable: true
        repostOf:
          $ref: "#/components/schemas/RepostInfo"
          nullable: true
        topics:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        deletedAt:
          type: string
          nullable: true
      required:
        - id
        - authorId
        - kind
        - topics
        - createdAt
        - updatedAt
    PostListResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/PostResponse"
        total:
          type: integer
          description: Total count of posts matching the query
      required:
        - posts
        - total
    MediaUploadResponse:
      type: object
      properties:
        url:
          type: string
          description: The stable URL of the uploaded media file
        mediaId:
          type: string
          description: The unique identifier for the uploaded media
        mimeType:
          type: string
          description: The MIME type of the uploaded file
        sizeBytes:
          type: integer
          description: The size of the uploaded file in bytes
      required:
        - url
        - mediaId
        - mimeType
        - sizeBytes
    CommentCreateRequest:
      type: object
      properties:
        text:
          type: string
          description: The comment text content
      required:
        - text
    AuthorProfile:
      type: object
      properties:
        userId:
          type: string
          description: The unique identifier for the user
        handle:
          type: string
          description: The user's unique handle
        name:
          type: string
          description: The user's display name
        avatarUrl:
          type: string
          nullable: true
          description: The URL of the user's avatar image
      required:
        - userId
        - handle
        - name
    CommentResponse:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the comment
        postId:
          type: string
          description: The ID of the post this comment belongs to
        author:
          $ref: "#/components/schemas/AuthorProfile"
          description: The author of the comment with their profile information
        text:
          type: string
          description: The comment text content
        createdAt:
          type: string
          description: ISO timestamp when the comment was created
      required:
        - id
        - postId
        - author
        - text
        - createdAt
    CommentListResponse:
      type: object
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/CommentResponse"
          description: Array of comments for the post
        total:
          type: integer
          description: Total count of comments for the post
      required:
        - comments
        - total



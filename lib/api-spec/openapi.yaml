          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Collab not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateCollab
      tags: [collab]
      summary: Update a collaboration
      description: Given an authenticated user and a collab they are part of, when they update it, then the collab status or post content is updated. Only the target user can accept a pending collab request.
      security:
        - cookieAuth: []
      parameters:
        - name: collabId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the collaboration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCollabRequest"
      responses:
        "200":
          description: Collab updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollabResponse"
        "400":
          description: Invalid request (validation error or unauthorized action)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not authorized to update this collab
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Collab not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteCollab
      tags: [collab]
      summary: Delete a collaboration
      description: Given an authenticated user and a pending collab they requested, when they delete it, then the collab request is cancelled. Completed collabs cannot be deleted (the post must be deleted instead).
      security:
        - cookieAuth: []
      parameters:
        - name: collabId
          in: path
          required: true
          schema:
            type: string
          description: The ID of the collaboration
      responses:
        "204":
          description: Collab deleted successfully
        "400":
          description: Invalid request (cannot delete completed collab)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not authorized to delete this collab
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Collab not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /collabs:
    get:
      operationId: listCollabs
      tags: [collab]
      summary: List collaborations
      description: Given an authenticated user, when they request their collabs, then incoming and outgoing collab requests are returned with pagination.
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [incoming, outgoing, all]
            default: all
          description: Filter by collab type (incoming, outgoing, or all)
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, accepted, rejected, cancelled]
          description: Filter by collab status
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Maximum number of collabs to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of collabs to skip for pagination
      responses:
        "200":
          description: Collabs retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollabListResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /music/search:
    get:
      operationId: searchMusic
      tags: [music]
      summary: Search for music tracks
      description: Given a search query, when a user searches for music, then track results are fetched from the external music service. Results include track metadata, artist information, album details, and platform-specific IDs. Audio previews are not included due to licensing restrictions.
      security:
        - cookieAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (track name, artist, or album)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 50
          description: Maximum number of results to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of results to skip for pagination
      responses:
        "200":
          description: Search results retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicSearchResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limit exceeded from external music service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /music/share:
    post:
      operationId: shareMusic
      tags: [music]
      summary: Share a music track
      description: Given an authenticated user and a track ID, when they share a track, then a music card is generated with track metadata and deep links to streaming platforms. The track ID is stored for future reference.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MusicShareRequest"
      responses:
        "201":
          description: Music shared successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicShareResponse"
        "400":
          description: Invalid request (validation error or invalid track ID)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Track not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /location/share:
    post:
      operationId: shareLocation
      tags: [location]
      summary: Share current location
      description: Given an authenticated user, when they share their location, then their last known location is stored with an expiration time and shared with selected friends via audience list. Location data expires after 24 hours by default.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationShareRequest"
      responses:
        "201":
          description: Location shared successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationResponse"
        "400":
          description: Invalid request (validation error or invalid coordinates)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateLocationShare
      tags: [location]
      summary: Update location sharing settings
      description: Given an authenticated user, when they update their location sharing settings, then the audience list and expiration are updated. Users can exclude specific friends from seeing their location.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationUpdateRequest"
      responses:
        "200":
          description: Location sharing updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Location share not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /location/map:
    get:
      operationId: getLocationMap
      tags: [location]
      summary: Get location map of friends
      description: Given an authenticated user, when they request the location map, then location-tagged content from friends (based on audience list visibility) is displayed on a map. Only locations from friends who have enabled sharing are returned.
      security:
        - cookieAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Maximum number of locations to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Number of locations to skip for pagination
      responses:
        "200":
          description: Location map retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationMapResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_id
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 8
      required:
        - email
        - password
    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password
    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        emailVerified:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - email
        - createdAt
        - updatedAt
    ProfileResponse:
      type: object
      properties:
        userId:
          type: string
        handle:
          type: string
        name:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        wallpaper:
          type: string
          nullable: true
        accentColor:
          type: string
          nullable: true
        moodLabel:
          type: string
          nullable: true
        moodIcon:
          type: string
          nullable: true
        nowPlaying:
          type: string
          nullable: true
        profileSongId:
          type: string
          nullable: true
          description: The external music service track ID for the profile song
        profileSongUpdatedAt:
          type: string
          nullable: true
          description: ISO timestamp when the profile song was last updated
        moduleSettings:
          type: array
          items:
            $ref: "#/components/schemas/ProfileModule"
        joinedAt:
          type: string
      required:
        - userId
        - handle
        - name
        - moduleSettings
        - joinedAt
    ProfileModule:
      type: object
      properties:
        id:
          type: string
          enum: [about, topFriends, mood, posts]
        visible:
          type: boolean
        visibility:
          type: string
          enum: [everyone, friends, onlyMe]
        order:
          type: number
      required:
        - id
        - visible
        - visibility
        - order
    UserProfileResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        profile:
          $ref: "#/components/schemas/ProfileResponse"
      required:
        - user
        - profile
    Error:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    ProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        wallpaper:
          type: string
          nullable: true
        accentColor:
          type: string
          nullable: true
        moodLabel:
          type: string
          nullable: true
        moodIcon:
          type: string
          nullable: true
        nowPlaying:
          type: string
          nullable: true
        moduleSettings:
          type: array
          items:
            $ref: "#/components/schemas/ProfileModule"
    TopFriendsResponse:
      type: object
      properties:
        topFriends:
          type: array
          items:
            type: string
          description: Array of user IDs representing the user's top friends
      required:
        - topFriends
    TopFriendsUpdateRequest:
      type: object
      properties:
        topFriends:
          type: array
          items:
            type: string
          description: Array of user IDs to set as top friends
      required:
        - topFriends
    PostKind:
      type: string
      enum: [text, video, reel]
    RepostInfo:
      type: object
      properties:
        originalPostId:
          type: string
        originalAuthorId:
          type: string
      required:
        - originalPostId
        - originalAuthorId
    RemixInfo:
      type: object
      properties:
        originalPostId:
          type: string
        originalAuthorId:
          type: string
      required:
        - originalPostId
        - originalAuthorId
    DuetInfo:
      type: object
      properties:
        originalPostId:
          type: string
        originalAuthorId:
          type: string
        layout:
          type: string
          enum: [side-by-side, picture-in-picture, split]
      required:
        - originalPostId
        - originalAuthorId
        - layout
    TextPostContent:
      type: object
      properties:
        kind:
          type: string
          enum: [text]
        text:
          type: string
        locationId:
          type: string
          nullable: true
          description: Optional location ID to tag the post with a shared location
      required:
        - kind
        - text
    VideoPostContent:
      type: object
      properties:
        kind:
          type: string
          enum: [video]
        title:
          type: string
        thumbnailUrl:
          type: string
        durationLabel:
          type: string
        viewsLabel:
          type: string
        locationId:
          type: string
          nullable: true
          description: Optional location ID to tag the post with a shared location
      required:
        - kind
        - title
        - thumbnailUrl
        - durationLabel
        - viewsLabel
    ReelPostContent:
      type: object
      properties:
        kind:
          type: string
          enum: [reel]
        caption:
          type: string
        thumbnailUrl:
          type: string
        soundLabel:
          type: string
        viewsLabel:
          type: string
        locationId:
          type: string
          nullable: true
          description: Optional location ID to tag the post with a shared location
      required:
        - kind
        - caption
        - thumbnailUrl
        - soundLabel
        - viewsLabel
    PostCreateRequest:
      oneOf:
        - $ref: "#/components/schemas/TextPostContent"
        - $ref: "#/components/schemas/VideoPostContent"
        - $ref: "#/components/schemas/ReelPostContent"
    PostResponse:
      type: object
      properties:
        id:
          type: string
        authorId:
          type: string
        kind:
          $ref: "#/components/schemas/PostKind"
        text:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        caption:
          type: string
          nullable: true
        thumbnailUrl:
          type: string
          nullable: true
        durationLabel:
          type: string
          nullable: true
        viewsLabel:
          type: string
          nullable: true
        soundLabel:
          type: string
          nullable: true
        repostOf:
          $ref: "#/components/schemas/RepostInfo"
          nullable: true
        remixOf:
          $ref: "#/components/schemas/RemixInfo"
          nullable: true
        duetOf:
          $ref: "#/components/schemas/DuetInfo"
          nullable: true
        collabRequestStatus:
          type: string
          enum: [pending, accepted, rejected, cancelled]
          nullable: true
        secondAuthorId:
          type: string
          nullable: true
        topics:
          type: array
          items:
            type: string
        audience:
          type: string
          enum: [everyone, friends, custom]
          nullable: true
        audienceListId:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
        deletedAt:
          type: string
          nullable: true
      required:
        - id
        - authorId
        - kind
        - topics
        - createdAt
        - updatedAt
    PostListResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/PostResponse"
        total:
          type: integer
          description: Total count of posts matching the query
      required:
        - posts
        - total
    MediaUploadResponse:
      type: object
      properties:
        url:
          type: string
          description: The stable URL of the uploaded media file
        mediaId:
          type: string
          description: The unique identifier for the uploaded media
        mimeType:
          type: string
          description: The MIME type of the uploaded file
        sizeBytes:
          type: integer
          description: The size of the uploaded file in bytes
      required:
        - url
        - mediaId
        - mimeType
        - sizeBytes
    CommentCreateRequest:
      type: object
      properties:
        text:
          type: string
          description: The comment text content
      required:
        - text
    AuthorProfile:
      type: object
      properties:
        userId:
          type: string
          description: The unique identifier for the user
        handle:
          type: string
          description: The user's unique handle
        name:
          type: string
          description: The user's display name
        avatarUrl:
          type: string
          nullable: true
          description: The URL of the user's avatar image
      required:
        - userId
        - handle
        - name
    CommentResponse:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the comment
        postId:
          type: string
          description: The ID of the post this comment belongs to
        author:
          $ref: "#/components/schemas/AuthorProfile"
          description: The author of the comment with their profile information
        text:
          type: string
          description: The comment text content
        createdAt:
          type: string
          description: ISO timestamp when the comment was created
      required:
        - id
        - postId
        - author
        - text
        - createdAt
    CommentListResponse:
      type: object
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/CommentResponse"
          description: Array of comments for the post
        total:
          type: integer
          description: Total count of comments for the post
      required:
        - comments
        - total
    EngagementSummary:
      type: object
      properties:
        postId:
          type: string
          description: The ID of the post
        likeCount:
          type: integer
          description: Total number of likes for the post
        saveCount:
          type: integer
          description: Total number of saves for the post
        repostCount:
          type: integer
          description: Total number of reposts for the post (derived from posts table)
        viewerHasLiked:
          type: boolean
          description: Whether the current viewer has liked this post
        viewerHasSaved:
          type: boolean
          description: Whether the current viewer has saved this post
        viewerHasReposted:
          type: boolean
          description: Whether the current viewer has reposted this post
      required:
        - postId
        - likeCount
        - saveCount
        - repostCount
        - viewerHasLiked
        - viewerHasSaved
        - viewerHasReposted
    FriendRequestStatus:
      type: string
      enum: [pending, accepted, declined, cancelled]
    SendFriendRequestRequest:
      type: object
      properties:
        targetUserId:
          type: string
          description: The ID of the user to send a friend request to
      required:
        - targetUserId
    FriendRequestResponse:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the friend request
        senderId:
          type: string
          description: The ID of the user who sent the request
        receiverId:
          type: string
          description: The ID of the user who received the request
        status:
          $ref: "#/components/schemas/FriendRequestStatus"
          description: The current status of the friend request
        createdAt:
          type: string
          description: ISO timestamp when the request was created
        updatedAt:
          type: string
          description: ISO timestamp when the request was last updated
      required:
        - id
        - senderId
        - receiverId
        - status
        - createdAt
        - updatedAt
    FriendRequestListResponse:
      type: object
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/FriendRequestResponse"
          description: Array of friend requests
        total:
          type: integer
          description: Total count of friend requests
      required:
        - requests
        - total
    FriendshipResponse:
      type: object
      properties:
        userId:
          type: string
          description: The ID of the user
        friendId:
          type: string
          description: The ID of the friend
        createdAt:
          type: string
          description: ISO timestamp when the friendship was created
      required:
        - userId
        - friendId
        - createdAt
    FriendProfile:
      type: object
      properties:
        userId:
          type: string
          description: The unique identifier for the user
        handle:
          type: string
          description: The user's unique handle
        name:
          type: string
          description: The user's display name
        avatarUrl:
          type: string
          nullable: true
          description: The URL of the user's avatar image
      required:
        - userId
        - handle
        - name
    FriendListResponse:
      type: object
      properties:
        friends:
          type: array
          items:
            $ref: "#/components/schemas/FriendProfile"
          description: Array of friends with their profile information
        total:
          type: integer
          description: Total count of friends
      required:
        - friends
        - total
    RemoveFriendRequest:
      type: object
      properties:
        friendUserId:
          type: string
          description: The ID of the friend to remove
      required:
        - friendUserId
    FeedPost:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the post
        authorId:
          type: string
          description: The unique identifier for the author
        author:
          $ref: "#/components/schemas/AuthorProfile"
        kind:
          type: string
          enum: [text, video, reel]
          description: The kind of post
        text:
          type: string
          nullable: true
          description: The text content (for text posts)
        title:
          type: string
          nullable: true
          description: The title (for video posts)
        caption:
          type: string
          nullable: true
          description: The caption (for reel posts)
        thumbnailUrl:
          type: string
          nullable: true
          description: The URL of the thumbnail image
        durationLabel:
          type: string
          nullable: true
          description: The duration label (e.g., "3:45")
        viewsLabel:
          type: string
          nullable: true
          description: The views label (e.g., "1.2K")
        soundLabel:
          type: string
          nullable: true
          description: The sound label (for reels)
        topics:
          type: array
          items:
            type: string
          description: Array of topic tags
        createdAt:
          type: string
          description: ISO timestamp when the post was created
        engagement:
          $ref: "#/components/schemas/EngagementSummary"
      required:
        - id
        - authorId
        - author
        - kind
        - createdAt
        - engagement
    FeedResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/FeedPost"
          description: Array of posts with author information
        total:
          type: integer
          description: Total count of posts available
        limit:
          type: integer
          description: Maximum number of posts returned
        offset:
          type: integer
          description: Number of posts skipped
      required:
        - posts
        - total
        - limit
        - offset
    NotificationType:
      type: string
      enum: [like, comment, friendRequest, friendAccepted, repost, save]
      description: The type of notification event
    Notification:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the notification
        recipientId:
          type: string
          description: The ID of the user who received the notification
        actorId:
          type: string
          description: The ID of the user who triggered the notification
        type:
          $ref: "#/components/schemas/NotificationType"
          description: The type of notification event
        postId:
          type: string
          nullable: true
          description: The ID of the post related to the notification (for like, comment, repost, save)
        readAt:
          type: string
          nullable: true
          description: ISO timestamp when the notification was marked as read
        createdAt:
          type: string
          description: ISO timestamp when the notification was created
      required:
        - id
        - recipientId
        - actorId
        - type
        - createdAt
    NotificationResponse:
      type: object
      properties:
        notification:

openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: profiles
    description: Profile operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      description: Given a valid email and password, when a user registers, then an account is created and a session is established via HTTP-only cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          headers:
            Set-Cookie:
              description: Session cookie (HttpOnly, Secure, SameSite=Strict)
              schema:
                type: string
                example: session_id=abc123; Path=/; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      description: Given valid credentials, when a user logs in, then a session is established via HTTP-only cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: Session cookie (HttpOnly, Secure, SameSite=Strict)
              schema:
                type: string
                example: session_id=abc123; Path=/; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials (generic error, does not reveal account existence)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current session
      description: Given an authenticated user, when they log out, then the session is terminated and the cookie is cleared.
      security:
        - cookieAuth: []
      responses:
        "204":
          description: Logout successful
          headers:
            Set-Cookie:
              description: Session cookie cleared
              schema:
                type: string
                example: session_id=; Path=/; HttpOnly; Secure; SameSite=Strict; Max-Age=0
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      description: Given an authenticated user, when they request their profile, then their user and profile information is returned.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/refresh:
    post:
      operationId: refreshSession
      tags: [auth]
      summary: Refresh session
      description: Given a valid session cookie, when refreshed, then the session expiration is extended.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Session refreshed
          headers:
            Set-Cookie:
              description: Refreshed session cookie (HttpOnly, Secure, SameSite=Strict)
              schema:
                type: string
                example: session_id=xyz789; Path=/; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Invalid or expired session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /profiles/{handle}:
    get:
      operationId: getProfileByHandle
      tags: [profiles]
      summary: Get profile by handle
      description: Given a profile handle, when a viewer requests it, then the profile is returned with modules filtered by the viewer's relationship (everyone, friends, or onlyMe visibility).
      security:
        - cookieAuth: []
      parameters:
        - name: handle
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      summary: Get current user's profile
      description: Given an authenticated user, when they request their profile, then their full profile with all modules is returned regardless of visibility settings.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user's profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMyProfile
      tags: [profiles]
      summary: Update current user's profile
      description: Given an authenticated user, when they update their profile, then allowed fields and module settings are persisted atomically. Immutable fields (userId, joinedAt) are rejected.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /profiles/me/top-friends:
    get:
      operationId: getMyTopFriends
      tags: [profiles]
      summary: Get current user's top friends
      description: Given an authenticated user, when they request their top friends, then the list of top friend user IDs is returned.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Top friends retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopFriendsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMyTopFriends
      tags: [profiles]
      summary: Update current user's top friends
      description: Given an authenticated user, when they update their top friends, then the list of top friend user IDs is persisted.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopFriendsUpdateRequest"
      responses:
        "200":
          description: Top friends updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopFriendsResponse"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_id
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 8
      required:
        - email
        - password
    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password
    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        emailVerified:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - email
        - createdAt
        - updatedAt
    ProfileResponse:
      type: object
      properties:
        userId:
          type: string
        handle:
          type: string
        name:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        wallpaper:
          type: string
          nullable: true
        accentColor:
          type: string
          nullable: true
        moodLabel:
          type: string
          nullable: true
        moodIcon:
          type: string
          nullable: true
        nowPlaying:
          type: string
          nullable: true
        moduleSettings:
          type: array
          items:
            $ref: "#/components/schemas/ProfileModule"
        joinedAt:
          type: string
      required:
        - userId
        - handle
        - name
        - moduleSettings
        - joinedAt
    ProfileModule:
      type: object
      properties:
        id:
          type: string
          enum: [about, topFriends, mood, posts]
        visible:
          type: boolean
        visibility:
          type: string
          enum: [everyone, friends, onlyMe]
        order:
          type: number
      required:
        - id
        - visible
        - visibility
        - order
    UserProfileResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        profile:
          $ref: "#/components/schemas/ProfileResponse"
      required:
        - user
        - profile
    Error:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    ProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        wallpaper:
          type: string
          nullable: true
        accentColor:
          type: string
          nullable: true
        moodLabel:
          type: string
          nullable: true
        moodIcon:
          type: string
          nullable: true
        nowPlaying:
          type: string
          nullable: true
        moduleSettings:
          type: array
          items:
            $ref: "#/components/schemas/ProfileModule"
    TopFriendsResponse:
      type: object
      properties:
        topFriends:
          type: array
          items:
            type: string
          description: Array of user IDs representing the user's top friends
      required:
        - topFriends
    TopFriendsUpdateRequest:
      type: object
      properties:
        topFriends:
          type: array
          items:
            type: string
          description: Array of user IDs to set as top friends
      required:
        - topFriends


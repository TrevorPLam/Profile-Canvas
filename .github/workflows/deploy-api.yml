name: Deploy API Server

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/db/**'
      - 'lib/api-zod/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./artifacts/api-server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production
        run: |
          echo "Deploying API server to production environment"
          # Add deployment commands here based on your hosting platform
          # Examples:
          # - kubectl apply -f k8s/api-server.yaml
          # - docker-compose up -d
          # - aws ecs update-service --cluster my-cluster --service api-server
          #
          # When deploying, ensure the following environment variables are set:
          # - DATABASE_URL (from ${{ secrets.PROD_DATABASE_URL }})
          # - SESSION_SECRET (from ${{ secrets.PROD_SESSION_SECRET }})
          # - JWT_SECRET (from ${{ secrets.PROD_JWT_SECRET }})
          # - AWS_S3_BUCKET (from ${{ secrets.PROD_AWS_S3_BUCKET }})
          # - AWS_REGION (from ${{ secrets.PROD_AWS_REGION }})
          # - AWS_ACCESS_KEY_ID (from ${{ secrets.PROD_AWS_ACCESS_KEY_ID }})
          # - AWS_SECRET_ACCESS_KEY (from ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }})
          #
          # For platforms like Kubernetes, use secrets management:
          # kubectl create secret generic corkboard-secrets \
          #   --from-literal=database-url="${{ secrets.PROD_DATABASE_URL }}" \
          #   --from-literal=session-secret="${{ secrets.PROD_SESSION_SECRET }}" \
          #   --from-literal=jwt-secret="${{ secrets.PROD_JWT_SECRET }}"

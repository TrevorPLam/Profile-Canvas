name: Deploy API Server

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/db/**'
      - 'lib/api-zod/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./artifacts/api-server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production
        run: |
          echo "Deployment configuration needed - choose one of the following options:"
          echo ""
          echo "Option 1: Docker Compose (simple)"
          echo "  docker-compose -f docker-compose.prod.yml up -d"
          echo ""
          echo "Option 2: Kubernetes"
          echo "  kubectl set image deployment/api-server api-server=\${{ secrets.DOCKER_REGISTRY }}/\${{ secrets.DOCKER_IMAGE_NAME }}:\${{ github.sha }}"
          echo "  kubectl rollout status deployment/api-server"
          echo ""
          echo "Option 3: AWS ECS"
          echo "  aws ecs update-service --cluster corkboard --service api-server --force-new-deployment"
          echo ""
          echo "Option 4: Railway/Render/Other PaaS"
          echo "  Use their CLI or webhook integration"
          echo ""
          echo "Required environment variables for deployment:"
          echo "  - DATABASE_URL"
          echo "  - SESSION_SECRET"
          echo "  - JWT_SECRET"
          echo "  - AWS_S3_BUCKET (for media storage)"
          echo "  - AWS_REGION"
          echo "  - AWS_ACCESS_KEY_ID"
          echo "  - AWS_SECRET_ACCESS_KEY"
          echo ""
          echo "To enable deployment, uncomment and configure one of the options above."
          echo "For now, deployment is disabled - this workflow only builds and pushes the Docker image."
